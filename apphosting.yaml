# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  cpu: 1
  memoryMiB: 1024
  # maxInstances: 100
  # concurrency: 80

# Environment variables and secrets.
# La clave web de Firebase NO debe estar en texto plano en git (Google la detecta en repos públicos).
# Creá el secreto una vez y asignale el valor NUEVO tras rotar la clave en GCP:
#   firebase apphosting:secrets:set LASGIRLS_FIREBASE_WEB_API_KEY
# Vinculalo al backend de App Hosting cuando el CLI lo pida.
env:
  - variable: APP_URL
    value: https://las-girls--las-girls.us-central1.hosted.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: LASGIRLS_FIREBASE_WEB_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "las-girls.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "las-girls"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "las-girls.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "498761024675"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:498761024675:web:4cfc7bfea7409141c7eb16"
    availability:
      - BUILD
      - RUNTIME
  # Google Analytics (GA4): añadir en Firebase App Hosting como env `NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID` = Measurement ID (`G-xxxx` desde Project settings → app web).

  # Grant access to secrets in Cloud Secret Manager.
  # You can create secrets with the CLI command `firebase apphosting:secrets:set <secretName>`.
  # See https://firebase.google.com/docs/app-hosting/configure#secret-parameters
  # - variable: MY_SECRET
  #   secret: mySecretRef
